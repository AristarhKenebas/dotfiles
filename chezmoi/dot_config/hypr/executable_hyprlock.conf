general {
    disable_loading_bar = true
    grace = 2
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/hypr/lockscreen.png
    color = rgb(10, 10, 10)
    blur_passes = 2
    blur_size = 4
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(232, 232, 232)
    font_size = 90
    font_family = Monaspace Neon
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgb(255, 110, 180)
    font_size = 18
    font_family = Monaspace Neon
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 1
    outer_color = rgb(26, 26, 26)
    inner_color = rgb(17, 17, 17)
    font_color = rgb(232, 232, 232)
    font_family = Monaspace Neon
    placeholder_text = <span foreground="##555555">password</span>
    rounding = 0
    check_color = rgb(255, 110, 180)
    fail_color = rgb(255, 80, 80)
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(hyprctl devices -j | jq -r '.keyboards[] | select(.main==true) | .active_keymap' | cut -c1-2 | tr a-z A-Z)"
    color = rgb(255, 110, 180)
    font_size = 14
    font_family = Monaspace Neon
    position = 0, 160
    halign = center
    valign = center
}